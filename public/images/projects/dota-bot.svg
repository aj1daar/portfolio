<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64">
  <!-- Background -->
  <rect width="32" height="32" fill="#1a2744"/>

  <!-- Telegram badge (top right) -->
  <rect x="26" y="0" width="4" height="2" fill="#2aabee"/>
  <rect x="24" y="2" width="4" height="2" fill="#2aabee"/>

  <!-- Hair (silver/white) -->
  <rect x="4" y="4" width="20" height="6" fill="#d4d4d4"/>

  <!-- Headphones (dark grey) -->
  <rect x="2" y="6" width="2" height="12" fill="#2d2d3d"/>
  <rect x="24" y="6" width="2" height="12" fill="#2d2d3d"/>

  <!-- Sound wave dots (gold, outside headphones) -->
  <rect x="0" y="10" width="2" height="2" fill="#c9a227"/>
  <rect x="0" y="14" width="2" height="2" fill="#c9a227"/>
  <rect x="30" y="10" width="2" height="2" fill="#c9a227"/>
  <rect x="30" y="14" width="2" height="2" fill="#c9a227"/>

  <!-- Face (blue-grey skin, Drow Ranger) -->
  <rect x="4" y="10" width="20" height="10" fill="#7bafc9"/>

  <!-- Eyes (green, glowing) -->
  <rect x="8" y="12" width="2" height="2" fill="#a3c45a"/>
  <rect x="18" y="12" width="2" height="2" fill="#a3c45a"/>

  <!-- Mouth -->
  <rect x="10" y="16" width="8" height="2" fill="#1a2744"/>

  <!-- Gold shield crest (bottom) -->
  <rect x="6" y="20" width="16" height="2" fill="#c9a227"/>
  <rect x="4" y="22" width="20" height="4" fill="#c9a227"/>
  <rect x="6" y="26" width="16" height="2" fill="#c9a227"/>
  <rect x="8" y="28" width="12" height="2" fill="#c9a227"/>
  <rect x="10" y="30" width="8" height="2" fill="#c9a227"/>
</svg>
