<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="64" height="64">
  <!-- Background -->
  <rect width="32" height="32" fill="#6b4c2a"/>

  <!-- Magnifying glass circle (beige outline) -->
  <rect x="6" y="4" width="8" height="2" fill="#e8d9b0"/>
  <rect x="4" y="6" width="2" height="8" fill="#e8d9b0"/>
  <rect x="14" y="6" width="2" height="8" fill="#e8d9b0"/>
  <rect x="6" y="14" width="8" height="2" fill="#e8d9b0"/>

  <!-- Handle (diagonal, beige) -->
  <rect x="14" y="14" width="2" height="2" fill="#e8d9b0"/>
  <rect x="16" y="16" width="2" height="2" fill="#e8d9b0"/>
  <rect x="18" y="18" width="2" height="2" fill="#e8d9b0"/>
  <rect x="20" y="20" width="2" height="2" fill="#e8d9b0"/>
  <rect x="22" y="22" width="4" height="4" fill="#e8d9b0"/>

  <!-- Code > symbol (accent green) -->
  <rect x="6" y="6" width="2" height="2" fill="#a3c45a"/>
  <rect x="8" y="8" width="2" height="2" fill="#a3c45a"/>
  <rect x="6" y="10" width="2" height="2" fill="#a3c45a"/>
  <!-- Dash after > -->
  <rect x="10" y="8" width="4" height="2" fill="#a3c45a"/>
</svg>
